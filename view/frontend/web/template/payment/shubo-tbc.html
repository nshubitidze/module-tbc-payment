<div class="payment-method" data-bind="css: {'_active': (getCode() == isChecked())}">
    <div class="payment-method-title field choice">
        <input type="radio"
               name="payment[method]"
               class="radio"
               data-bind="attr: {'id': getCode()}, value: getCode(), checked: isChecked, click: selectPaymentMethod, visible: isRadioButtonVisible()"/>
        <label data-bind="attr: {'for': getCode()}" class="label">
            <span data-bind="text: getTitle()"></span>
        </label>
    </div>

    <div class="payment-method-content" data-bind="visible: isChecked() == getCode()">
        <!-- ko if: paymentError() -->
        <div class="message message-error error" data-bind="text: paymentError()"></div>
        <!-- /ko -->

        <div class="shubo-tbc-payment-wrapper" data-bind="style: accentStyle()">

            <!-- Branding header (only if logo or description configured) -->
            <!-- ko if: hasBranding() -->
            <div class="shubo-tbc-branding">
                <!-- ko if: brandLogoUrl() -->
                <img class="shubo-tbc-branding__logo"
                     data-bind="attr: {src: brandLogoUrl()}" alt="" />
                <!-- /ko -->
                <!-- ko if: brandDescription() -->
                <span class="shubo-tbc-branding__description"
                      data-bind="text: brandDescription()"></span>
                <!-- /ko -->
            </div>
            <!-- /ko -->

            <!-- Flitt embed container (embed mode only) -->
            <!-- ko if: isEmbedMode() -->
            <div id="shubo-tbc-embed-container" style="min-height: 100px;"></div>
            <!-- /ko -->

        </div>

        <!-- Loading indicator (embed mode only) -->
        <!-- ko if: isEmbedMode() && !isEmbedLoaded() && !paymentError() -->
        <div style="text-align:center; padding:20px; color:#999;">
            <span data-bind="i18n: 'Loading secure payment form...'"></span>
        </div>
        <!-- /ko -->

        <!-- Billing address -->
        <!-- ko if: isEmbedMode() ? isEmbedLoaded() : true -->
        <div class="payment-method-billing-address">
            <!-- ko foreach: $parent.getRegion('billingAddress') -->
            <!-- ko template: getTemplate() --><!-- /ko -->
            <!-- /ko -->
        </div>
        <!-- /ko -->

        <!-- Place Order button -->
        <!-- ko if: isEmbedMode() ? (isEmbedLoaded() && !isProcessing()) : !isProcessing() -->
        <div class="actions-toolbar">
            <div class="primary">
                <button class="action primary checkout" type="submit"
                        data-bind="click: placeOrder, attr: {title: $t('Place Order')}">
                    <span data-bind="i18n: 'Place Order'"></span>
                </button>
            </div>
        </div>
        <!-- /ko -->

        <!-- Processing indicator -->
        <!-- ko if: isProcessing() -->
        <div style="text-align:center; padding:20px;">
            <span data-bind="i18n: 'Processing payment...'"></span>
        </div>
        <!-- /ko -->
    </div>
</div>
